name: Generate Release Notes
description: Generate changelog from git tags for the current release

inputs:
  tag_name:
    description: GitHub ref name of the release tag
    required: true

outputs:
  notes:
    description: Generated release notes body
    value: ${{ steps.changelog.outputs.notes }}

runs:
  using: composite
  steps:
    - name: Generate changelog
      id: changelog
      shell: bash
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          LOG=$(git log --pretty=format:"* %s (%h)" "${{ inputs.tag_name }}" --not --tags)
        else
          LOG=$(git log --pretty=format:"* %s (%h)" "$PREV_TAG..${{ inputs.tag_name }}")
        fi
        DELIMITER=$(echo "END_OF_NOTES_$(openssl rand -hex 8)" )
        {
          echo "notes<<$DELIMITER"
          echo "$LOG"
          echo "$DELIMITER"
        } >> "$GITHUB_OUTPUT"
