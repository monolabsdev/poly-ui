name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  OLLAMA_HOST: http://127.0.0.1:11434
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: macos

          - name: Windows
            os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure macOS native build flags
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          {
            echo "MACOSX_DEPLOYMENT_TARGET=11.0"
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0"
            echo "CMAKE_C_FLAGS=-mmacosx-version-min=11.0"
            echo "CMAKE_CXX_FLAGS=-D_LIBCPP_DISABLE_AVAILABILITY -mmacosx-version-min=11.0"
          } >> "$GITHUB_ENV"

      - name: Build OpenBench installer
        run: bun run tauri build

      # =========================
      # WINDOWS OLLAMA INSTALLER
      # =========================

      - name: Build OpenBench + Ollama Windows installer
        if: matrix.platform == 'windows'
        run: bun run ollama-setup

      # =========================
      # MACOS OLLAMA INSTALLER
      # =========================

      - name: Build OpenBench + Ollama macOS installer
        if: matrix.platform == 'macos'
        run: bash scripts/macos/build-ollama-pkg.sh

      # =========================
      # UPLOAD ARTIFACTS
      # =========================

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/pkg/*.pkg

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload OpenBench + Ollama Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-ollama-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*Ollama*.exe

      # =========================
      # CREATE DRAFT RELEASE
      # =========================

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
