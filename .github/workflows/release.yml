name: Release

on:
  push:
    tags: [v*]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  OLLAMA_HOST: http://127.0.0.1:11434

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: macos
          - name: Windows
            os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Openbench installer
        run: bun run tauri build

      - name: Upload Openbench macOS installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Openbench Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Build Openbench + Ollama Windows installer
        if: matrix.platform == 'windows'
        run: bun run ollama-setup

      - name: Upload Openbench + Ollama Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-ollama-windows
          path: src-tauri/target/release/bundle/nsis/*Ollama*.exe
          if-no-files-found: error

      - name: Build Openbench + Ollama macOS installer
        if: matrix.platform == 'macos'
        run: bash scripts/macos/build-ollama-pkg.sh

      - name: Upload Openbench + Ollama macOS installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: openbench-ollama-macos
          path: src-tauri/target/release/bundle/pkg/*.pkg
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'push' }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
