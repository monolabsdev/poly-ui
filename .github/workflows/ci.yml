name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build

  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev pkg-config
      # rust-cache prunes target/debug/libonnxruntime.so but keeps st-tts's
      # build-script fingerprint, so the script never re-downloads it and
      # polyui's build.rs fails to stage the runtime. Force st-tts to rebuild
      # when the library is missing.
      - name: Restore Supertonic ONNX runtime pruned by rust-cache
        run: |
          if [ ! -f src-tauri/target/debug/libonnxruntime.so ]; then
            cargo clean --manifest-path src-tauri/Cargo.toml -p st-tts
          fi
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Verify ts-rs bindings are up to date
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml export_bindings
          if ! git diff --exit-code -- src/features/embedded-webview/generated; then
            echo "::error::ts-rs bindings are stale. Run: cargo test --manifest-path src-tauri/Cargo.toml export_bindings"
            exit 1
          fi

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run test
