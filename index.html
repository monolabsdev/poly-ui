<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/polyui-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tauri + React + Typescript</title>
    <script>
      try {
        const persisted = JSON.parse(localStorage.getItem('polyui:settings') || '{}');
        const m = persisted.state || persisted;
        const mode = localStorage.getItem('theme_mode') || m.mode || 'dark';
        const d = mode === 'dark' || (mode === 'system' && matchMedia('(prefers-color-scheme:dark)').matches);
        document.documentElement.classList.toggle('dark', d);
        document.documentElement.style.backgroundColor = d ? '#171717' : '#ffffff';
      } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
