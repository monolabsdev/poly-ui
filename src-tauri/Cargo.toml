[package]
name = "polyui"
version = "0.11.0-rc.1"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

[lib]
name = "polyui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["dictation"]
dictation = ["dep:whisper-rs"]
dev-sql-console = []

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-http = "2"
tauri-plugin-opener = "2"
tauri-plugin-window-state = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ollama-rs = { version = "0.3.4", features = ["stream", "macros"] }
tokio = "1.50.0"
tokio-stream = "0.1.18"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
bcrypt = "0.15"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "macros", "migrate"] }
reqwest = { version = "0.12", features = ["rustls-tls"] }
async-trait = "0.1"
async-stream = "0.3"
futures = "0.3.32"
log = "0.4"
tauri-plugin-fs = "2"
tauri-plugin-os = "2"
tauri-plugin-supertonic = "0.1"
whisper-rs = { version = "0.16", optional = true }
